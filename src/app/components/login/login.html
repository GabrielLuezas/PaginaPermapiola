<div class="auth-container container">
  <div class="auth-card glass-card">
    <div class="auth-header text-center">
      <span class="auth-logo-icon">🔑</span>
      <h1 class="page-title glow-text-fire">Iniciar Sesión</h1>
      <p class="auth-subtitle">Ingresa a tu cuenta de PermaPiola para ver los adelantos de cambios según tu rango.</p>
    </div>

    <!-- Error Alert Box -->
    <div *ngIf="errorMessage()" class="error-alert">
      <span class="error-icon">⚠️</span>
      <span class="error-text">{{ errorMessage() }}</span>
    </div>

    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input 
            type="text" 
            id="username" 
            name="username" 
            [(ngModel)]="username" 
            required 
            placeholder="Tu nombre de usuario"
            autocomplete="username"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input 
            type="password" 
            id="password" 
            name="password" 
            [(ngModel)]="password" 
            required 
            placeholder="Tu contraseña"
            autocomplete="current-password"
          />
        </div>
      </div>

      <button type="submit" class="btn-fire btn-auth" [disabled]="loading()">
        {{ loading() ? 'Ingresando...' : 'Iniciar Sesión' }}
      </button>
    </form>

    <div class="auth-footer text-center">
      <p>¿Aún no tienes cuenta? <a routerLink="/register" class="auth-link">Regístrate aquí</a></p>
    </div>
  </div>
</div>

<div class="auth-container container">
  <div class="auth-card glass-card">
    <div class="auth-header text-center">
      <span class="auth-logo-icon">📝</span>
      <h1 class="page-title glow-text-fire">Crear Cuenta</h1>
      <p class="auth-subtitle">Regístrate para guardar tu perfil y obtener acceso según tu rango.</p>
    </div>

    <!-- Error Alert Box -->
    <div *ngIf="errorMessage()" class="error-alert">
      <span class="error-icon">⚠️</span>
      <span class="error-text">{{ errorMessage() }}</span>
    </div>

    <!-- Register Form -->
    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="auth-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input 
            type="text" 
            id="username" 
            name="username" 
            [(ngModel)]="username" 
            required 
            placeholder="Min. 3 caracteres"
            autocomplete="username"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input 
            type="password" 
            id="password" 
            name="password" 
            [(ngModel)]="password" 
            required 
            placeholder="Min. 6 caracteres"
            autocomplete="new-password"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">🛡️</span>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            [(ngModel)]="confirmPassword" 
            required 
            placeholder="Repite tu contraseña"
            autocomplete="new-password"
          />
        </div>
      </div>

      <button type="submit" class="btn-fire btn-auth" [disabled]="loading()">
        {{ loading() ? 'Registrando...' : 'Registrarse' }}
      </button>
    </form>

    <div class="auth-footer text-center">
      <p>¿Ya tienes una cuenta? <a routerLink="/login" class="auth-link">Inicia sesión aquí</a></p>
    </div>
  </div>
</div>
